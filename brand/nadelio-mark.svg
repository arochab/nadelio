<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" fill="#ffffff"/>
  <!-- N, drawn as two solid strokes plus a diagonal. -->
  <g fill="#3d6b5c">
    <rect x="300" y="292" width="92" height="440" rx="6"/>
    <rect x="632" y="292" width="92" height="440" rx="6"/>
    <polygon points="392,292 484,292 724,732 632,732" />
  </g>
  <!-- The confidence-interval mark: a violet dot on a sage bar, the bounded-
       score motif used on the field guide cover and every measurement. -->
  <rect x="392" y="600" width="240" height="14" rx="7" fill="#5b8c7e"/>
  <circle cx="512" cy="607" r="34" fill="#6e5696"/>
</svg>
