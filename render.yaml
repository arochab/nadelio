services:
  - type: web
    name: nadelio
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: BRIGHTDATA_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # Public site URL. Single source of truth for every canonical / OG / share
      # / user-agent URL. Set to https://nadelio.com once the custom domain is
      # verified live on Render; until then leave unset to keep the Render URL.
      - key: SITE_URL
        sync: false
      # Model for the single identity-inference call per audit. Sonnet 5 is a
      # stronger identifier / disambiguator for obscure bare brand names than the
      # Haiku used for the high-volume AI-visibility calls. Override if needed.
      - key: INFER_MODEL
        value: "claude-sonnet-5"
      - key: MAX_LIVE_RUNS
        value: "25"
      - key: LIVE_RUNS_PER_IP
        value: "3"
      # AI-visibility run counts. The number of runs drives both cost (one Haiku
      # call per run) and the width of the bounded score's confidence interval.
      # Free gets an honest but wider interval; the paid Deep Audit buys a tighter
      # one. MAX is a hard ceiling protecting unit economics.
      - key: FREE_AI_RUNS
        value: "3"
      - key: DEEP_AI_RUNS
        value: "8"
      - key: MAX_AI_RUNS
        value: "15"
      - key: WAITLIST_WEBHOOK_URL
        sync: false
      # Durable audit history (the longitudinal moat) on Cloudflare D1. All three
      # must be set in the Render dashboard for logging to activate; if any is
      # missing the history logger is a safe no-op and audits are unaffected. The
      # token MUST be scoped to D1:Edit only (never DNS/Zone).
      - key: CF_ACCOUNT_ID
        sync: false
      - key: CF_D1_DB_ID
        sync: false
      - key: CF_D1_TOKEN
        sync: false
      # Owner-only secret gating the private dashboards (/analytics and
      # /api/admin/funnel). Not an account or login, just a shared secret set in
      # the Render dashboard; without it those routes return 404 to everyone. Use
      # a long random string, then view stats at /analytics?token=THAT_VALUE.
      - key: ADMIN_TOKEN
        sync: false
      # Stripe Checkout (Deep Audit paywall). Both must be set in the Render
      # dashboard for payments to work; if either is missing the payment
      # endpoints return "payments not configured" and the free flow is
      # unaffected.
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      # Monitoring subscription tiers (recurring monthly prices created in the
      # Stripe dashboard). Any missing tier returns a clean "not configured".
      - key: STRIPE_PRICE_MONITOR_STARTER
        sync: false
      - key: STRIPE_PRICE_MONITOR_PRO
        sync: false
      - key: STRIPE_PRICE_MONITOR_AGENCY
        sync: false
