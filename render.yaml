services:
  - type: web
    name: ai-visibility-checker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: BRIGHTDATA_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: MAX_LIVE_RUNS
        value: "25"
      - key: LIVE_RUNS_PER_IP
        value: "3"
      - key: AI_RUNS
        value: "3"
      - key: WAITLIST_WEBHOOK_URL
        sync: false
      # Stripe Checkout (Deep Audit paywall). Both must be set in the Render
      # dashboard for payments to work; if either is missing the payment
      # endpoints return "payments not configured" and the free flow is
      # unaffected.
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
