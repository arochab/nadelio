services:
  - type: web
    name: ai-visibility-checker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: BRIGHTDATA_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: MAX_LIVE_RUNS
        value: "25"
